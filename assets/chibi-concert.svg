<svg class="chibi-svg" viewBox="-10 -5 280 232">
  <defs>
    <linearGradient id="chibiGalaxy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3379"/>
      <stop offset="0.55" stop-color="#2a2560"/>
      <stop offset="1" stop-color="#1c1844"/>
